<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#F8F7FC" stroke="#D3D2E3" stroke-width="2"/>
  
  <!-- Left hand/person -->
  <g>
    <!-- Left hand reaching -->
    <path d="M 30 50 Q 25 45 22 40 Q 20 35 18 30" stroke="#D4846A" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Fingers -->
    <circle cx="18" cy="30" r="2.5" fill="#D4846A"/>
    
    <!-- Forearm -->
    <path d="M 30 50 L 20 35" stroke="#D4846A" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.8"/>
  </g>
  
  <!-- Right hand/person -->
  <g>
    <!-- Right hand reaching -->
    <path d="M 70 50 Q 75 45 78 40 Q 80 35 82 30" stroke="#5D5A88" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Fingers -->
    <circle cx="82" cy="30" r="2.5" fill="#5D5A88"/>
    
    <!-- Forearm -->
    <path d="M 70 50 L 80 35" stroke="#5D5A88" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.8"/>
  </g>
  
  <!-- Center heart connecting them -->
  <g transform="translate(50, 55)">
    <!-- Heart shape -->
    <path d="M 0 -2 C -4 -6 -8 -4 -8 0 C -8 4 -4 8 0 12 C 4 8 8 4 8 0 C 8 -4 4 -6 0 -2 Z" fill="#D4846A" opacity="0.9"/>
    
    <!-- Inner glow -->
    <path d="M 0 -2 C -4 -6 -8 -4 -8 0 C -8 4 -4 8 0 12 C 4 8 8 4 8 0 C 8 -4 4 -6 0 -2 Z" fill="#D4846A" opacity="0.2" r="12"/>
  </g>
  
  <!-- Decorative line connecting hands -->
  <line x1="35" y1="50" x2="65" y2="50" stroke="#D4846A" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.4"/>
  
  <!-- Top accent lines (representing connection/energy) -->
  <g opacity="0.6">
    <line x1="40" y1="35" x2="45" y2="28" stroke="#D4846A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="60" y1="35" x2="55" y2="28" stroke="#5D5A88" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
